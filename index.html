<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>

    <!-- TailWind + Daisy -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./style/style.css" />
  </head>
  <body>
    <div class="bg-base-200 min-h-screen flex items-center justify-center">
      <div
        class="bg-white card card-body shadow-xl max-w-[520px] mx-auto text-center"
      >
        <div>
          <img
            class="max-w-[100px] mx-auto"
            src="./assets/github-logo.png"
            alt=""
          />
          <h2 class="text-xl font-bold mt-6">GitHub Issues Tracker</h2>
          <p class="text-[#64748B]">Sign in to manage your issues</p>
        </div>

        <div class="w-full rounded-2xl">
          <div>
            <fieldset class="fieldset space-y-[9px]">
              <label class="label text-neutral font-bold">Username</label>

              <input
                id=""
                type="text"
                class="input w-full rounded-lg bg-base-200"
                placeholder="Enter Username"
              />

              <label class="label text-neutral font-bold">Password</label>

              <input
                id=""
                type="password"
                class="input w-full rounded-lg bg-base-200"
                placeholder="Enter Password"
              />

              <button id="" class="btn btn-primary mt-4 rounded-lg w-full">
                Sign in
              </button>
            </fieldset>
          </div>
        </div>

        <div class="divider">OR</div>

        <div class="bg-base-100 p-4 rounded-lg text-sm text-center">
          <p class="text-gray-500 mb-2">Demo Credentials:</p>

          <p><span class="font-semibold">Username:</span> admin</p>
          <p><span class="font-semibold">Password:</span> admin123</p>
        </div>
      </div>
    </div>
  </body>
</html>
