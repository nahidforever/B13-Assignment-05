<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>

    <!-- TailWind + Daisy -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./style/style.css" />
  </head>
  <body>
    <header class="bg-base-100 shadow-sm">
      <div
        class="max-w-[1440px] mx-auto flex justify-between items-center px-6 py-4"
      >
        <div class="flex items-center gap-3">
          <img src="./assets/github-logo.png" class="w-8 h-8" alt="" />
          <h2 class="text-xl font-bold">GitHub Issues Tracker</h2>
        </div>

        <div class="flex items-center gap-3">
          <input
            type="text"
            placeholder="Search issues..."
            class="input input-bordered w-40 md:w-64"
          />
          <button class="btn btn-primary">Search</button>
        </div>
      </div>
    </header>

    <main class="bg-base-200 min-h-screen p-6">
      <div class="max-w-[1110px] mx-auto mt-10">
        <div class="bg-base-100 p-6 rounded-lg shadow-sm">
          <div class="flex gap-2">
            <button id="allTab" class="btn btn-primary py-3 px-10">All</button>
            <button id="openTab" class="btn py-3 px-10">Open</button>
            <button id="closedTab" class="btn py-3 px-10">Closed</button>
          </div>
        </div>

        <div class="bg-base-100 p-6 rounded-lg shadow-sm mt-6">
          <h2 class="font-bold text-lg mb-2">
            <span id="issue-count">0</span> Issues
          </h2>
          <p class="text-sm text-gray-500">
            Track and manage your project issues
          </p>
        </div>

        <div id="allIssueContainer" class="grid grid-cols-4">
          <div class="bg-base-100 p-6 rounded-lg shadow-lg mt-6 space-y-3">
            <div class="flex justify-between items-center">
              <img src="./assets/Open-Status.png" alt="" />
              <p
                class="bg-[#FEECEC] text-red-600 py-0.5 px-5 rounded-full text-[12px]"
              >
                High
              </p>
            </div>

            <div>
              <h2 class="font-bold text-[14px]">
                Fix navigation menu on mobile devices
              </h2>
              <p class="text-[#64748B] line-clamp-2 text-[12px]">
                The navigation menu doesn't collapse properly on mobile
                devices...
              </p>
            </div>

            <div>
              <span class="bg-[#FDE68A] rounded-full px-3 text-[16px]">BUG</span>
              <span class="bg-[#FDE68A] rounded-full px-3 text-[16px]">Help Wanted</span>
            </div>

            <div
              class="border-t border-gray-200 -mx-6 pt-3 mt-3 px-6 text-xs text-gray-500 space-y-2"
            >
              <p>#1 by john_doe</p>
              <p>1/15/2024</p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="./script/issues.js"></script>
  </body>
</html>
