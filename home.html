<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>

    <!-- TailWind + Daisy -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./style/style.css" />
  </head>
  <body>
    <header class="bg-base-100 shadow-sm">
      <div
        class="max-w-[1440px] mx-auto flex justify-between items-center px-6 py-4"
      >
        <div class="flex items-center gap-3">
          <img src="./assets/github-logo.png" class="w-8 h-8" alt="" />
          <h2 class="text-xl font-bold">GitHub Issues Tracker</h2>
        </div>

        <div class="flex items-center gap-3">
          <input
            type="search"
            placeholder="Search issues..."
            class="input input-bordered w-40 md:w-64"
          />
          <button class="btn btn-primary">Search</button>
        </div>
      </div>
    </header>

    <main class="bg-base-200 min-h-screen p-6">
      <div class="max-w-[1110px] mx-auto mt-10">
        <div class="bg-base-100 p-6 rounded-lg shadow-sm">
          <!-- All Tabs -->
          <div class="flex gap-2">
            <button id="allTab" class="btn btn-primary py-3 px-10">All</button>
            <button id="openTab" class="btn py-3 px-10">Open</button>
            <button id="closedTab" class="btn py-3 px-10">Closed</button>
          </div>
        </div>

        <!-- Count Container -->

        <div
          class="bg-base-100 p-6 rounded-lg shadow-sm mt-6 flex justify-between items-center"
        >
          <div class="flex items-center gap-2">
            <div
              class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center"
            >
              <img src="./assets/Aperture.png" class="w-8 h-8" alt="" />
            </div>

            <div>
              <h2 class="font-bold text-lg">
                <span id="issueCount">0</span> Issues
              </h2>
              <p class="text-sm text-gray-500">
                Track and manage your project issues
              </p>
            </div>
          </div>

          <div class="flex gap-3 text-sm items-center">
            <p class="flex items-center gap-2">
              <span class="w-3 h-3 bg-green-500 rounded-full"></span>
              Open
            </p>

            <p class="flex items-center gap-2">
              <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
              Closed
            </p>
          </div>
        </div>

        <!-- loading spinner -->
        <div
          id="loadingSpinner"
          class="h-[60vh] flex hidden justify-center items-center"
        >
          <span class="loading loading-dots loading-xl"></span>
        </div>

        <!-- All Card -->

        <div id="allIssueContainer" class="grid grid-cols-3 gap-4 mt-7"></div>
      </div>

      <dialog id="issue-details-modal" class="modal">

       


      </dialog>
    </main>

    <script src="./script/issues.js"></script>
  </body>
</html>
